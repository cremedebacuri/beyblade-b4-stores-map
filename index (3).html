<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>B4ストアマップ — BEYBLADE X Store Locator</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2035;--cyan:#00d4ff;--cyan2:#00a8cc;--cyanglow:rgba(0,212,255,.15);--txt:#e2e8f0;--txt2:#94a3b8;--green:#34d399;--card:#151d30;--bdr:#1e293b}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}

#map{position:absolute;inset:0;z-index:1}
.leaflet-control-attribution{font-size:10px!important;background:rgba(10,14,26,.85)!important;color:var(--txt2)!important}
.leaflet-control-attribution a{color:var(--cyan2)!important}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--cyan)!important;border-color:var(--bdr)!important}
.leaflet-control-zoom a:hover{background:var(--bg3)!important}

.marker-cluster{background:rgba(0,212,255,.18)!important}
.marker-cluster div{background:radial-gradient(circle at 30% 30%,#1e3a5f,#0a1628)!important;color:#fff!important;font-family:'Orbitron',sans-serif!important;font-weight:700!important;font-size:12px!important;border:2px solid var(--cyan)!important;box-shadow:0 0 10px rgba(0,212,255,.3)!important}
.marker-cluster-small{background:rgba(0,212,255,.12)!important}
.marker-cluster-medium div{border-color:#00b4e6!important}
.marker-cluster-large div{border-color:#008cc8!important}

.pin{width:10px;height:10px;border-radius:50%;background:var(--cyan);border:2px solid #fff;box-shadow:0 0 6px rgba(0,212,255,.5);transition:transform .12s}
.pin:hover{transform:scale(1.6)}
.pin.s1{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,.5)}

.leaflet-popup-content-wrapper{background:var(--bg2)!important;color:var(--txt)!important;border:1px solid var(--bdr);border-radius:10px!important;box-shadow:0 8px 24px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--bg2)!important}
.leaflet-popup-content{margin:12px 14px!important;font-size:12px;line-height:1.6;min-width:220px}
.pn{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.pa{color:var(--txt2);font-size:11px;margin-bottom:2px}
.pt{color:var(--cyan);font-size:12px}
.pt a{color:var(--cyan);text-decoration:none}
.pb{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700}
.pb.s1{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.pb.no{background:rgba(148,163,184,.08);color:var(--txt2);border:1px solid rgba(148,163,184,.15)}
.gm-link{display:inline-block;margin-top:8px;padding:5px 10px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:6px;color:var(--cyan);font-size:11px;font-weight:700;text-decoration:none;transition:all .15s}
.gm-link:hover{background:rgba(0,212,255,.2)}

/* Locate button */
#locate-btn{
  position:absolute;bottom:30px;right:10px;z-index:1000;
  width:40px;height:40px;border-radius:8px;border:1px solid var(--bdr);
  background:var(--bg2);color:var(--cyan);font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);transition:all .2s;
}
#locate-btn:hover{background:var(--bg3);border-color:var(--cyan)}

/* Panel */
#panel{position:absolute;top:0;left:0;bottom:0;width:370px;z-index:1000;background:var(--bg);border-right:1px solid var(--bdr);display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1)}
#panel.collapsed{transform:translateX(-370px)}
#ptoggle{position:absolute;top:50%;right:-40px;transform:translateY(-50%);width:40px;height:56px;z-index:1001;background:var(--bg2);border:1px solid var(--bdr);border-left:none;border-radius:0 8px 8px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:16px;transition:all .2s}
#ptoggle:hover{background:var(--bg3)}
#phdr{padding:16px 18px;background:linear-gradient(135deg,#0d1525,#111d35);border-bottom:1px solid var(--bdr);flex-shrink:0}
#phdr h1{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--cyan),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;margin-bottom:1px}
.sub{font-size:10px;color:var(--txt2);letter-spacing:1px}
.stotal{display:inline-block;margin-top:6px;padding:2px 9px;background:var(--cyanglow);border:1px solid rgba(0,212,255,.3);border-radius:16px;font-size:10px;color:var(--cyan);font-family:'Orbitron',sans-serif}

#sarea{padding:10px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0;position:relative}
#sinput{width:100%;padding:9px 12px 9px 34px;background:var(--bg3);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:13px;outline:none;transition:border-color .2s}
#sinput:focus{border-color:var(--cyan)}
#sinput::placeholder{color:var(--txt2)}
.sicon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--txt2);pointer-events:none;font-size:14px}

#pfilt{padding:8px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;gap:6px;align-items:center}
#psel{flex:1;padding:7px 8px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-size:12px;outline:none}
#cbtn{padding:5px 10px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:var(--txt2);font-size:11px;cursor:pointer;transition:all .2s}
#cbtn:hover{border-color:var(--cyan);color:var(--cyan)}

#rinfo{padding:6px 18px;font-size:11px;color:var(--txt2);flex-shrink:0;border-bottom:1px solid var(--bdr)}
#slist{flex:1;overflow-y:auto;padding:4px 0}
#slist::-webkit-scrollbar{width:4px}
#slist::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

.sc{margin:3px 10px;padding:10px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all .12s}
.sc:hover,.sc.act{border-color:var(--cyan);background:#1a2540}
.sc .n{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.sc .a{font-size:10px;color:var(--txt2);margin-bottom:1px}
.sc .t{font-size:10px;color:var(--txt2)}
.sc .tg{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tg span{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.3px}
.tp{background:var(--cyanglow);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.ts{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.tn{background:rgba(148,163,184,.06);color:var(--txt2);border:1px solid rgba(148,163,184,.12)}

.empty{padding:30px 18px;text-align:center;color:var(--txt2);font-size:12px}

/* Legend */
#legend{position:absolute;bottom:30px;left:10px;z-index:1000;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--txt2)}
#legend span{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.lc{background:var(--cyan)}.lg{background:var(--green)}

@media(max-width:768px){
  #panel{top:auto;left:0;right:0;bottom:0;width:100%;height:55vh;border-right:none;border-top:1px solid var(--bdr);border-radius:14px 14px 0 0}
  #panel.collapsed{transform:translateY(calc(55vh - 52px))}
  #ptoggle{display:none}
  #phdr{padding:10px 18px;cursor:pointer}
  #phdr::before{content:'';display:block;width:32px;height:3px;background:var(--bdr);border-radius:2px;margin:0 auto 6px}
  #phdr h1{font-size:15px}
  #locate-btn{bottom:60vh;right:10px}
  #legend{bottom:60vh;left:10px}
}
</style>
</head>
<body>

<div id="map"></div>

<button id="locate-btn" onclick="locateMe()" title="現在地">📍</button>

<div id="legend"><span class="lc"></span>B4ストア <span class="lg" style="margin-left:6px"></span>S1大会対応</div>

<div id="panel">
  <button id="ptoggle" onclick="togPanel()">◀</button>
  <div id="phdr" onclick="if(innerWidth<=768)togPanel()">
    <h1>B4 STORE MAP</h1>
    <div class="sub">BEYBLADE X STORE LOCATOR</div>
    <div class="stotal">494 STORES</div>
  </div>
  <div id="sarea"><span class="sicon">🔍</span><input id="sinput" placeholder="店舗名・住所で検索..."></div>
  <div id="pfilt">
    <select id="psel"><option value="">すべての都道府県</option></select>
    <button id="cbtn" onclick="clearAll()">クリア</button>
  </div>
  <div id="rinfo"></div>
  <div id="slist"></div>
</div>

const PO=["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];

const map=L.map('map',{center:[36.2,138],zoom:6,zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/">OSM</a> · <a href="https://carto.com/">CARTO</a> | Data: <a href="https://beyblade.takaratomy.co.jp/">TOMY</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

const cg=L.markerClusterGroup({
  maxClusterRadius:18,
  disableClusteringAtZoom:12,
  spiderfyOnMaxZoom:true,
  showCoverageOnHover:false,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const sz=n<8?'small':n<25?'medium':'large';
    return L.divIcon({html:'<div>'+n+'</div>',className:'marker-cluster marker-cluster-'+sz,iconSize:L.point(36,36)});
  }
});

const markers={};
S.forEach(s=>{
  if(!s.lat)return;
  const is1=s.memo&&s.memo.startsWith('S1')&&!s.memo.includes('不可');
  const icon=L.divIcon({className:'',html:'<div class="pin'+(is1?' s1':'')+'"></div>',iconSize:[10,10],iconAnchor:[5,5]});
  const m=L.marker([s.lat,s.lng],{icon});
  const ml=!s.memo?'':s.memo.includes('不可')?'<span class="pb no">S1大会不可</span>':s.memo.startsWith('S1')?'<span class="pb s1">S1大会対応</span>':'';
  const gmUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(s.address1+' '+s.address2);
  m.bindPopup('<div class="pn">'+s.shop_name+'</div><div class="pa">📍 '+s.address1+' '+s.address2+'</div><div class="pt">📞 <a href="tel:'+s.tel+'">'+s.tel+'</a></div>'+ml+'<br><a class="gm-link" href="'+gmUrl+'" target="_blank" rel="noopener">Google Mapsで開く ↗</a>');
  cg.addLayer(m);
  markers[s.id]=m;
});
map.addLayer(cg);

// Prefecture dropdown
const bp={};
S.forEach(s=>{if(!bp[s.address1])bp[s.address1]=[];bp[s.address1].push(s)});
const sel=document.getElementById('psel');
PO.forEach(p=>{if(!bp[p])return;const o=document.createElement('option');o.value=p;o.textContent=p+' ('+bp[p].length+')';sel.appendChild(o)});

function getList(){
  const q=document.getElementById('sinput').value.toLowerCase();
  const p=sel.value;
  let r=S;
  if(p)r=r.filter(s=>s.address1===p);
  if(q)r=r.filter(s=>s.shop_name.toLowerCase().includes(q)||s.address2.toLowerCase().includes(q)||s.corp_name.toLowerCase().includes(q)||s.tel.includes(q));
  return r;
}

function render(list){
  document.getElementById('rinfo').textContent=list.length+'件';
  const el=document.getElementById('slist');
  if(!list.length){el.innerHTML='<div class="empty">該当なし</div>';return}
  const show=list.slice(0,80);
  el.innerHTML=show.map(s=>{
    const is1=s.memo&&s.memo.startsWith('S1')&&!s.memo.includes('不可');
    return '<div class="sc" data-id="'+s.id+'" onclick="fly('+s.id+')"><div class="n">'+s.shop_name+'</div><div class="a">📍 '+s.address1+' '+s.address2+'</div><div class="t">📞 '+s.tel+'</div><div class="tg"><span class="tp">'+s.address1+'</span>'+(s.memo?'<span class="'+(is1?'ts':'tn')+'">'+(is1?'S1対応':'S1不可')+'</span>':'')+'</div></div>';
  }).join('')+(list.length>80?'<div class="empty">他'+(list.length-80)+'件</div>':'');
}

function apply(){
  const list=getList();
  render(list);
  const wc=list.filter(s=>s.lat);
  if(wc.length&&(sel.value||document.getElementById('sinput').value)){
    map.fitBounds(L.latLngBounds(wc.map(s=>[s.lat,s.lng])),{padding:[40,40],maxZoom:14});
  }
}

function fly(id){
  const s=S.find(x=>x.id===id);
  if(!s||!s.lat)return;
  map.setView([s.lat,s.lng],17,{animate:true});
  const m=markers[id];
  if(m)setTimeout(()=>{cg.zoomToShowLayer(m,()=>m.openPopup())},300);
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('act'));
  const c=document.querySelector('[data-id="'+id+'"]');
  if(c)c.classList.add('act');
}

function clearAll(){
  document.getElementById('sinput').value='';
  sel.value='';
  map.setView([36.2,138],6,{animate:true});
  apply();
}

function togPanel(){
  const p=document.getElementById('panel');
  p.classList.toggle('collapsed');
  document.getElementById('ptoggle').textContent=p.classList.contains('collapsed')?'▶':'◀';
  setTimeout(()=>map.invalidateSize(),350);
}

function locateMe(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    map.setView(ll,13,{animate:true});
    L.circleMarker(ll,{radius:8,color:'#ff6b6b',fillColor:'#ff6b6b',fillOpacity:.7,weight:2}).addTo(map).bindPopup('現在地').openPopup();
  });
}

document.getElementById('sinput').addEventListener('input',apply);
sel.addEventListener('change',apply);
apply();
</script>
